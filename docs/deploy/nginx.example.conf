# Public Nginx example for a production-style wenjia-agent deployment.
#
# Assumptions:
# - The backend runs on 127.0.0.1:8000.
# - The built React SPA has been published to /var/www/wenjia-agent/dist.
# - Replace example.com with your own domain.
#
# Install example:
#   sudo cp docs/deploy/nginx.example.conf /etc/nginx/conf.d/wenjia-agent.conf
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/wenjia-agent/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://127.0.0.1:8000/api/;
    }

    location = /health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8000/health;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
