services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WENJIA_SESSION_DB_URL: sqlite+aiosqlite:////data/wenjia_agent_sessions.db
      WENJIA_TRACE_DIR: /app/logs/traces
      WENJIA_CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,https://www.jiajiahome.top
    volumes:
      - wenjia-data:/data
      - wenjia-logs:/app/logs
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/web/frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  wenjia-data:
  wenjia-logs:
