<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wenjia-agent Web Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Demo controls">
        <header class="brand">
          <img src="/static/wenjia-mark.svg" alt="" class="brand-mark" />
          <div>
            <h1>wenjia-agent</h1>
            <p>OpenAI Agents SDK web demo</p>
          </div>
        </header>

        <section class="panel">
          <h2>Session</h2>
          <p class="session-id" id="sessionId">loading</p>
          <button class="secondary-button" id="newSessionButton" type="button">New session</button>
        </section>

        <section class="panel">
          <h2>Examples</h2>
          <div class="prompt-list">
            <button type="button" data-prompt="请用工具计算一个基础命盘：姓名测试，性别未知，公历1995年5月12日9点30分，北京市北京市出生。只需要简短输出四柱和五行分布。">
              Basic BaZi chart
            </button>
            <button type="button" data-prompt="我想给一个公历2024年8月20日10点15分、北京市出生的孩子起名，姓林，偏清雅自然风格，请先给起名策略。">
              Naming strategy
            </button>
            <button type="button" data-prompt="帮我解释一下八字工具里的十神、纳音、神煞和空亡分别是什么，适合初学者理解。">
              Field explanation
            </button>
          </div>
        </section>

        <section class="panel status-panel">
          <h2>Status</h2>
          <p><span class="status-dot" id="statusDot"></span><span id="statusText">Checking</span></p>
        </section>
      </aside>

      <section class="chat-panel" aria-label="Agent chat">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Agent workspace</p>
            <h2>Ask for charting, analysis, naming, or tool help</h2>
          </div>
          <a href="/docs" target="_blank" rel="noreferrer">API docs</a>
        </header>

        <div class="messages" id="messages" aria-live="polite">
          <article class="message assistant">
            <div class="message-role">Agent</div>
            <div class="message-body">输入出生资料、合盘问题、起名需求或工具字段问题。我会通过 wenjia-agent 的工具和多 Agent 工作流处理。</div>
          </article>
        </div>

        <form class="composer" id="chatForm">
          <label class="sr-only" for="messageInput">Message</label>
          <textarea
            id="messageInput"
            rows="3"
            maxlength="4000"
            placeholder="Type a message. Shift + Enter for a new line."
            required
          ></textarea>
          <button id="sendButton" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
