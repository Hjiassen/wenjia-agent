name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: CI / Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==1.8.5

      - name: Install dependencies
        run: poetry install --with dev --no-interaction --no-ansi

      - name: Validate package metadata
        run: poetry check

      - name: Lint
        run: poetry run ruff check . --no-cache

      - name: Test
        run: poetry run pytest

      - name: Run offline eval contracts
        run: poetry run python scripts/run_evals.py --report evals/reports/ci-static.json

      - name: Compile Python sources
        run: poetry run python -m compileall wenjia_agent apps examples tests

  frontend:
    name: CI / Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web/frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
