name: Bug report
description: Report a reproducible problem in wenjia-agent.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please avoid posting API keys,
        private birth data, local databases, or trace files with personal content.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The Agent/web app/CLI did ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproduction you can.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Instead ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Python package
        - CLI examples
        - Web backend
        - Web frontend
        - Deployment scripts
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, Poetry version, Node version, browser, deployment mode
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact API keys, private profile data, and personal trace content.
      render: shell
