name: Feature request
description: Suggest a feature, tool, prompt improvement, or documentation change.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What user need does this solve?
      placeholder: I want to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
      placeholder: Add ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent orchestration
        - Deterministic BaZi core
        - Function tools
        - Prompt templates
        - Structured output schemas
        - Web app
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: I also considered ...
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, or links are welcome. Avoid private personal data.
